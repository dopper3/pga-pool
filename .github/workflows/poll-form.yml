name: Poll Google Form

on:
  workflow_dispatch:

  # Poll the main entry form every 5 minutes through May. The poller is
  # stateless and dedups by display name, so running it after the cutoff
  # is harmless (the poller also drops any rows past SUBMISSION_CUTOFF).
  schedule:
    - cron: "*/5 * * 5 *"

permissions:
  contents: write

concurrency:
  group: poll-form
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip if FORM_CSV_URL is not set
        id: gate
        env:
          FORM_CSV_URL: ${{ vars.FORM_CSV_URL }}
        run: |
          if [ -z "$FORM_CSV_URL" ]; then
            echo "FORM_CSV_URL repo variable is not set — form ingestion not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure scores.json exists (so picks can be validated)
        if: steps.gate.outputs.configured == 'true'
        run: |
          if [ ! -f data/scores.json ] || [ ! -s data/scores.json ]; then
            python scripts/fetch_scores.py
          fi

      - name: Poll form
        if: steps.gate.outputs.configured == 'true'
        env:
          FORM_CSV_URL: ${{ vars.FORM_CSV_URL }}
        run: python scripts/poll_form.py

      - name: Commit updated entries
        if: steps.gate.outputs.configured == 'true'
        run: |
          git config user.name "pga-pool-bot"
          git config user.email "pga-pool-bot@users.noreply.github.com"
          if git diff --quiet -- data/entries.json; then
            echo "No entry changes."
            exit 0
          fi
          git add data/entries.json
          git commit -m "form: sync entries $(date -u +'%Y-%m-%d %H:%MZ')"
          # Race with update-scores.yml: it touches data/scores.json, we touch
          # data/entries.json, so a rebase is guaranteed conflict-free. Retry
          # a few times in case another commit lands while we're rebasing.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying..."
            sleep 3
          done
          echo "Exhausted push retries."
          exit 1
